<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きょうのこと、ちょっとずつ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Yomogi&family=M+PLUS+Rounded+1c:wght@400;700&display=swap">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #eaf6ff;
            --card-bg: #ffffff;
            --text-color: #5c6b78;
            --accent-color: #bfe3f5;
            --highlight-color: #fff3cd;
            --time-bg-morning: #ffe9ec;
            --time-bg-noon: #fff6dd;
            --time-bg-night: #e3eef9;
        }

        body {
            font-family: 'Yomogi', 'M PLUS Rounded 1c', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button, input, textarea {
            font-family: inherit;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(165, 150, 140, 0.1);
            padding: 14px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
            padding: 4px 0 0;
        }
        .page-title {
            font-family: 'Yomogi', 'M PLUS Rounded 1c', sans-serif;
            font-size: 14px;
            color: #5f96b3;
            margin-bottom: 0px;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }
        .date-display {
            font-family: 'Yomogi', 'M PLUS Rounded 1c', sans-serif;
            font-size: 12px;
            font-weight: normal;
            color: #5f96b3;
            margin-bottom: 0px;
            line-height: 1.3;
        }

        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        #morning-clear-btn {
            display: none;
            flex: 1;
            background-color: #fff0f3;
            color: #ff9aab;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        .footer-bar {
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin-top: 10px;
        }
        .music-link {
            background: none;
            border: none;
            color: #a9c4d6;
            font-size: 12px;
            cursor: pointer;
            padding: 6px 10px;
        }
        .music-link.playing {
            color: #7fb3d5;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: #eef7fc;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            color: #8fb8d2;
        }
        .tab-btn.active {
            background: var(--accent-color);
            color: #fff;
        }
        .tab-btn:nth-child(2).active { background: #ffd3da; color: #fff; }
        .tab-btn:nth-child(3).active { background: #ffe9ad; color: #8a6d2c; }
        .tab-btn:nth-child(4).active { background: #cdddf2; color: #fff; }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .task-item-content {
            display: flex;
            align-items: center;
            background: #fbfdff;
            border: none;
            border-radius: 14px;
            padding: 10px 8px;
            gap: 6px;
            box-sizing: border-box;
            width: 100%;
            position: relative;
            z-index: 2;
            touch-action: pan-y;
            transition: transform 0.2s ease;
            cursor: grab;
        }
        .task-item-content:active {
            cursor: grabbing;
        }

        .delete-zone {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 76px;
            background-color: #f4f0ea;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .delete-zone-btn {
            background: none;
            border: none;
            color: #b0a7a0;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
        }
        
        .sortable-ghost {
            opacity: 0.4;
            background-color: #eef5ff;
        }

        .task-item-content.important .task-text {
            font-weight: bold;
        }

        .task-item-content.completed .task-text,
        .task-item-content.completed .time-badge,
        .task-item-content.completed .important-dot {
            opacity: 0.45;
        }
        .task-item-content.completed .task-text {
            text-decoration: line-through;
            color: #b0a7a0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            padding: 0 2px;
        }
        .checkbox-wrapper input {
            width: 17px;
            height: 17px;
            margin: 0;
            cursor: pointer;
        }

        .important-dot-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .important-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #e8e4df;
            display: block;
            transition: background-color 0.15s ease;
        }
        .important-dot-btn.active .important-dot {
            background-color: #ffc4d6;
        }

        .task-text {
            flex: 1;
            min-width: 0;
            border: none;
            background: transparent;
            font-size: 17px;
            font-weight: 500;
            font-family: inherit;
            color: var(--text-color);
            padding: 4px 2px;
            box-sizing: border-box;
            resize: none;
            overflow: hidden;
            line-height: 1.4;
        }
        .task-text:focus {
            outline: none;
            background: #faf6f0;
            border-radius: 4px;
        }

        .time-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 15px;
            cursor: pointer;
            user-select: none;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .time-morning { background-color: #ffe9ec; }
        .time-noon { background-color: #fff6dd; }
        .time-night { background-color: #e3eef9; }


        .add-container {
            margin-top: 12px;
            display: flex;
            gap: 6px;
        }
        .add-input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            border: none;
            background: #f3faff;
            border-radius: 12px;
            font-size: 15px;
        }
        .add-input:focus {
            outline: none;
            background: #eaf6ff;
        }
        .add-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="page-title">きょうのこと、ちょっとずつ</div>
        <div class="date-display" id="today-date">----年--月--日 (-)</div>
    </div>

    <div class="quick-actions">
        <button id="morning-clear-btn" onclick="resetAllChecks()">あさのじゅんび</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('all')">すべて</button>
        <button class="tab-btn" onclick="switchTab('morning')">🌅 あさ</button>
        <button class="tab-btn" onclick="switchTab('noon')">☀️ ひる</button>
        <button class="tab-btn" onclick="switchTab('night')">🌙 よる</button>
    </div>

    <ul class="task-list" id="task-list"></ul>

    <div class="add-container">
        <input type="text" id="new-task-input" class="add-input" placeholder="あたらしいこと" onkeypress="handleKeyPress(event)">
        <button class="add-btn" onclick="addTask()">追加</button>
    </div>
</div>

<div class="footer-bar">
    <button id="music-btn" class="music-link" onclick="toggleMusic()">Music</button>
</div>

<script>
    let tasks = [
        { id: 1, text: "娘のピアノの送り迎え", time: "morning", completed: false, important: true },
        { id: 2, text: "メール返信と書類整理", time: "noon", completed: false, important: false },
        { id: 3, text: "お気に入りの曲を聴いてのんびり", time: "night", completed: false, important: false }
    ];

    let currentFilter = 'all';
    let isMusicPlaying = false;
    let audioCtx = null;
    let sortableInstance = null;

    window.onload = function() {
        setTodayDate();
        checkTimeAndSetSpeech();
        renderTasks();
        initSortable();
        enableWakeLock();
    };

    function setTodayDate() {
        const now = new Date();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayOfWeekEn = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][now.getDay()];
        document.getElementById('today-date').innerText = `${month}がつ${date}にち ${dayOfWeekEn}.`;
    }

    function checkTimeAndSetSpeech() {
        const hour = new Date().getHours();
        const morningBtn = document.getElementById('morning-clear-btn');

        if (hour >= 5 && hour < 10) {
            morningBtn.style.display = "block";
        } else {
            morningBtn.style.display = "none";
        }
    }

    function initSortable() {
        const el = document.getElementById('task-list');
        sortableInstance = Sortable.create(el, {
            animation: 200,
            ghostClass: 'sortable-ghost',
            delay: 150,
            delayOnTouchOnly: true,
            touchStartThreshold: 5,
            onEnd: function (evt) {
                const items = el.querySelectorAll('.task-item');
                let newTasks = [];
                let unrenderedTasks = tasks.filter(t => {
                    if (currentFilter === 'all') return false;
                    return t.time !== currentFilter;
                });
                items.forEach(item => {
                    const id = parseInt(item.getAttribute('data-id'));
                    const found = tasks.find(t => t.id === id);
                    if (found) newTasks.push(found);
                });
                tasks = [...newTasks, ...unrenderedTasks];
            }
        });
    }

    function initSwipe(contentEl) {
        let startX = 0;
        let currentX = 0;
        let dragging = false;
        const OPEN_X = -76;
        const DELETE_THRESHOLD = -120;

        function closeOthers() {
            document.querySelectorAll('.task-item-content').forEach(el => {
                if (el !== contentEl) {
                    el.style.transform = 'translateX(0px)';
                    el.dataset.open = '0';
                }
            });
        }

        contentEl.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            currentX = contentEl.dataset.open === '1' ? OPEN_X : 0;
            dragging = true;
            contentEl.style.transition = 'none';
        }, { passive: true });

        contentEl.addEventListener('touchmove', (e) => {
            if (!dragging) return;
            const deltaX = e.touches[0].clientX - startX;
            let newX = currentX + deltaX;
            if (newX > 0) newX = 0;
            if (newX < DELETE_THRESHOLD) newX = DELETE_THRESHOLD;
            contentEl.style.transform = `translateX(${newX}px)`;
        }, { passive: true });

        contentEl.addEventListener('touchend', (e) => {
            if (!dragging) return;
            dragging = false;
            contentEl.style.transition = 'transform 0.2s ease';
            const deltaX = e.changedTouches[0].clientX - startX;
            const finalX = currentX + deltaX;

            if (finalX < DELETE_THRESHOLD + 20) {
                const id = parseInt(contentEl.closest('.task-item').getAttribute('data-id'));
                contentEl.style.transform = `translateX(-100%)`;
                setTimeout(() => deleteTask(id), 180);
            } else if (finalX < OPEN_X / 2) {
                contentEl.style.transform = `translateX(${OPEN_X}px)`;
                contentEl.dataset.open = '1';
                closeOthers();
            } else {
                contentEl.style.transform = 'translateX(0px)';
                contentEl.dataset.open = '0';
            }
        });
    }

    function renderTasks() {
        const listEl = document.getElementById('task-list');
        listEl.innerHTML = '';

        let filteredTasks = tasks;
        if (currentFilter !== 'all') {
            filteredTasks = tasks.filter(t => t.time === currentFilter);
        }

        filteredTasks.forEach((task) => {
            const li = document.createElement('li');
            li.className = 'task-item';
            li.setAttribute('data-id', task.id);
            
            let timeText = "🌅";
            let timeClass = "time-morning";
            if (task.time === "noon") { timeText = "☀️"; timeClass = "time-noon"; }
            if (task.time === "night") { timeText = "🌙"; timeClass = "time-night"; }

            li.innerHTML = `
                <div class="delete-zone">
                    <button class="delete-zone-btn" onclick="deleteTask(${task.id})">🗑️</button>
                </div>
                <div class="task-item-content ${task.important ? 'important' : ''} ${task.completed ? 'completed' : ''}">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleComplete(${task.id})">
                    </div>
                    <button class="important-dot-btn ${task.important ? 'active' : ''}" onclick="toggleImportant(${task.id})"><span class="important-dot"></span></button>
                    <textarea class="task-text" rows="1" oninput="autoResize(this)" onchange="updateText(${task.id}, this.value)">${task.text}</textarea>
                    <span class="time-badge ${timeClass}" onclick="cycleTime(${task.id})">${timeText}</span>
                </div>
            `;
            listEl.appendChild(li);
            const textarea = li.querySelector('.task-text');
            autoResize(textarea);
            initSwipe(li.querySelector('.task-item-content'));
        });
    }

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function addTask() {
        const input = document.getElementById('new-task-input');
        const text = input.value.trim();
        if (!text) return;

        const newTask = {
            id: Date.now(),
            text: text,
            time: currentFilter === 'all' ? 'morning' : currentFilter,
            completed: false,
            important: false
        };

        tasks.push(newTask);
        input.value = '';
        renderTasks();
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            addTask();
        }
    }

    function toggleComplete(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            if (task.completed) playCuteSound();
            renderTasks();
        }
    }

    function toggleImportant(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.important = !task.important;
            renderTasks();
        }
    }

    function resetAllChecks() {
        tasks.forEach(t => t.completed = false);
        alert("すべてのチェックを外しました！");
        renderTasks();
    }

    function cycleTime(id) {
        const task = tasks.find(t => t.id === id);
        if (task) {
            if (task.time === "morning") task.time = "noon";
            else if (task.time === "noon") task.time = "night";
            else task.time = "morning";
            renderTasks();
        }
    }

    function updateText(id, newText) {
        const task = tasks.find(t => t.id === id);
        if (task) task.text = newText;
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks();
    }

    function switchTab(tabName) {
        currentFilter = tabName;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderTasks();
    }

    function playCuteSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.08); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        } catch(e) {}
    }

    function toggleMusic() {
        const btn = document.getElementById('music-btn');
        isMusicPlaying = !isMusicPlaying;
        if (isMusicPlaying) {
            btn.classList.add('playing');
            btn.textContent = "Pause";
            window.open("https://music.youtube.com/search?q=" + encodeURIComponent("Cateen"), "_blank");
        } else {
            btn.classList.remove('playing');
            btn.textContent = "Music";
        }
    }

    let wakeLock = null;
    async function enableWakeLock() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }
</script>
</body>
</html>
