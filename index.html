<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ふみ勉！本日のタスク管理</title>

    <!-- PWA設定 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a8b89a">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iPad/iOS用設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ふみ勉">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

    <!-- favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@500;700&display=swap');

        :root {
            --bg-color: #f2efe9;
            --card-bg: #fbf9f4;
            --text-main: #6b6259;
            --gray: #c7c1b7;
            --line: #e2ddd3;
            --accent-pink: #d9b6ab;   /* rose */
            --accent-blue: #a8b89a;   /* moss（青枠の代わりに使用） */
            --accent-yellow: #cdbfa0; /* 落ち着いたサンド系 */
            --accent-green: #a8b89a; /* moss */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Zen Maru Gothic', 'Hiragino Kaku Gothic ProN', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page-title {
            font-family: 'Yusei Magic', sans-serif;
            font-size: 20px;
            color: var(--gray);
            margin-bottom: 4px;
        }

        /* 画面全体のコンテナ */
        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 1fr;
            }
            .full-width {
                grid-column: 1 / -1;
            }
        }

        /* パネル共通スタイル */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 4px 14px rgba(107, 98, 89, 0.06);
            border: 2px solid var(--line);
            position: relative;
            transition: all 0.3s ease;
        }

        .card::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 4px;
            background: var(--accent-blue);
            bottom: 10px;
            right: 10px;
            opacity: 0.4;
        }

        h2 {
            font-family: 'Yusei Magic', sans-serif;
            font-size: 16px;
            font-weight: normal;
            color: var(--text-main);
            opacity: 0.85;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* タイマーセクション */
        .timer-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .timer-circle {
            position: relative;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: conic-gradient(var(--accent-blue) 360deg, #ece8e0 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: inset 0 0 8px rgba(107, 98, 89, 0.08);
        }

        .timer-inner {
            width: 142px;
            height: 142px;
            background: var(--card-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Yusei Magic', sans-serif;
            font-size: 30px;
            color: var(--text-main);
        }

        .timer-controls button {
            padding: 11px 22px;
            font-size: 14px;
            font-family: 'Yusei Magic', sans-serif;
            border: 2px solid var(--accent-blue);
            border-radius: 50px;
            background-color: #eef2e9;
            color: var(--text-main);
            cursor: pointer;
            margin: 4px;
        }

        .timer-controls button:active {
            transform: scale(0.95);
        }

        .alarm-inputs {
            margin-bottom: 12px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        
        .alarm-inputs div {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .alarm-inputs input {
            font-size: 16px;
            font-family: 'Zen Maru Gothic', sans-serif;
            padding: 4px 8px;
            border-radius: 10px;
            border: 2px solid var(--line);
            background: #f5f2ec;
            color: var(--text-main);
            text-align: center;
        }
        .input-time { width: 110px; }
        .input-min { width: 60px; }

        /* ガチャ・キャラクターセクション */
        .gacha-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .char-display {
            display: inline-block;
            font-family: 'Yusei Magic', sans-serif;
            font-size: 13px;
            color: #fff;
            margin: 8px 0;
            min-height: 16px;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--accent-pink);
            opacity: 0.85;
            width: auto;
        }

        .speech-bubble {
            background: #f5f2ec;
            border-radius: 18px;
            padding: 14px;
            margin-top: 8px;
            font-size: 14px;
            color: #857c72;
            position: relative;
            width: 100%;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* タスクセクション */
        .task-list {
            list-style: none;
            max-height: none;
            overflow-y: visible;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: #f6f4ee;
            border-radius: 18px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 500;
            transition: all 0.2s;
            border: 2px solid var(--line);
            user-select: none;
            -webkit-user-select: none;
        }

        .task-item:active {
            transform: scale(0.98);
        }

        .task-item.completed {
            background: #eef2e9;
            border-color: var(--accent-blue);
            color: #93a187;
            text-decoration: line-through;
            opacity: 0.7;
            animation: pop 0.3s ease-in-out;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--gray);
            background: #f5f2ec;
            margin-right: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .completed .task-checkbox {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .completed .task-checkbox::after {
            content: "✓";
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .task-delete {
            color: var(--gray) !important;
            margin-left: 6px;
            font-size: 18px;
            padding: 0 4px;
        }

        .task-edit {
            margin-left: 6px;
            font-size: 16px;
            padding: 0 4px;
            opacity: 0.7;
        }

        .task-handle {
            margin-left: 10px;
            font-size: 20px;
            color: var(--gray);
            padding: 0 6px;
            cursor: grab;
            touch-action: none;
        }

        .sortable-ghost {
            opacity: 0.4;
        }

        /* データ入力用隠しフォーム */
        .import-section {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .import-toggle {
            align-self: flex-start;
            background: none;
            border: none;
            color: var(--gray);
            font-size: 13px;
            cursor: pointer;
            text-decoration: underline;
            text-align: left;
            font-family: 'Zen Maru Gothic', sans-serif;
        }
        
        .import-area {
            display: none;
            margin-top: 4px;
        }
        
        .import-area input {
            width: 70%;
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 10px;
            border: 2px solid var(--line);
            background: #f5f2ec;
            color: var(--text-main);
        }
        
        .import-area button {
            padding: 8px 14px;
            font-size: 14px;
            font-family: 'Yusei Magic', sans-serif;
            background: var(--gray);
            color: white;
            border: none;
            border-radius: 10px;
        }

        /* リンクランチャーセクション */
        .launcher-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .launcher-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 20px;
            color: #fff;
            text-decoration: none;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 17px;
            font-weight: 700;
            text-align: center;
            box-shadow: 0 4px 10px rgba(107, 98, 89, 0.08);
            transition: transform 0.2s;
            opacity: 0.92;
        }

        .launcher-btn:active {
            transform: scale(0.95);
        }

        .btn-ecc { background-color: #7b8ea3; }
        .btn-ytm { background-color: #c08a8a; }
        .btn-gemini-eng { background-color: #d3a36b; }
        .btn-gemini-his { background-color: #a98b6a; }
        .btn-gemini-math { background-color: #8a9fc0; }
        .btn-gemini-sci { background-color: #93a98a; }
        .btn-gemini-soc { background-color: #a692b3; }

        .launcher-btn span {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 11px;
            font-weight: normal;
            opacity: 0.85;
            margin-top: 4px;
        }

        /* アニメーション */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(217, 182, 171, 0.6); }
            70% { box-shadow: 0 0 0 18px rgba(217, 182, 171, 0); }
            100% { box-shadow: 0 0 0 0 rgba(217, 182, 171, 0); }
        }

        .alarm-active {
            animation: pulse 1.5s infinite;
            background-color: #f3e5e0 !important;
        }
    </style>
</head>
<body>
    <div class="page-title">ふみ勉、すみっこで。</div>
    <div class="container">
        <div class="card timer-card">
            <h2>⏱️ いま、なんじ　<span id="liveClock" style="font-size:22px;"></span></h2>
            <div class="alarm-inputs">
                <div>
                    <label>よびかけのじかん: </label>
                    <input type="time" id="alarmTime" class="input-time" value="17:00">
                </div>
                <div>
                    <label>そっとタイマー: </label>
                    <input type="number" id="timerDuration" class="input-min" value="25" min="1" max="180"> 分
                </div>
            </div>
            <div class="timer-circle" id="timerCircle">
                <div class="timer-inner" id="timerText">25:00</div>
            </div>
            <div class="timer-controls">
                <button id="startTimerBtn" onclick="toggleTimer()">カウントダウン開始</button>
                <button id="resetTimerBtn" style="background-color:#9aa5b1;" onclick="resetTimer()">リセット</button>
                <button id="stopAlarmBtn" style="display:none; background-color:#b5685a; color:#fff; border-color:#b5685a; font-weight:bold;" onclick="stopAlarm()">アラームを止めてガチャ！</button>
            </div>
        </div>

        <div class="card gacha-card" id="gachaCard">
            <h2>🎁 きょうのとなり</h2>
            <div class="char-display" id="charName">タイマー停止で出現！</div>
            <div class="speech-bubble" id="charSpeech">ここにキャラクターのセリフが表示されて、iPadが喋るよ！</div>
        </div>

        <div class="card task-card full-width">
            <h2>📝 きょうのこと、ちょっとずつ</h2>
            <ul class="task-list" id="taskList">
                </ul>

            <div class="import-section">
                <span style="font-size:13px; color:#888;">✅ タスクの状態はこのiPadに自動保存されます</span>
                <button class="import-toggle" onclick="toggleImportArea()">＋タスクを手動で一括登録・修正する</button>
                <div class="import-area" id="importArea">
                    <input type="text" id="csvTasks" placeholder="算数プリント、漢字、歴史（、でも,でも区切れるよ）">
                    <button onclick="importTasksFromInput()">登録</button>
                </div>
            </div>
        </div>

        <div class="card launcher-card full-width">
            <h2>🚪 いつものおへや</h2>
            <div class="launcher-grid">
                <a href="https://pt.eccjrst.jp/App_D/StudentTop/Init?fid=EJC3&tab=0.716799565459043" target="ecc_tab" class="launcher-btn btn-ecc">
                    ECCストリーミング
                    <span>上品なネイビー</span>
                </a>
                <a href="https://music.youtube.com/" target="_blank" class="launcher-btn btn-ytm">
                    YouTube Music
                    <span>スタイリッシュ赤黒</span>
                </a>

                <a href="https://gemini.google.com/gem/1-WLKowbJCI4zq0J2JTd3Z-mVU2tuWRtq?usp=sharing" target="_blank" class="launcher-btn btn-gemini-eng">
                    英会話の先生の部屋
                    <span>パステルオレンジ</span>
                </a>
                <a href="https://gemini.google.com/gem/1DWIgUVzzGQ4-7jaC4akMBiQ11-rLr3u-?usp=sharing" target="_blank" class="launcher-btn btn-gemini-his">
                    歴史の先生の部屋
                    <span>知的なブラウン</span>
                </a>
                <a href="https://gemini.google.com/gem/1vLfju_wGTGxXrzVQO4KKvdDyWTvQodYm?usp=sharing" target="_blank" class="launcher-btn btn-gemini-math">
                    算数の先生の部屋
                    <span>論理のブルー</span>
                </a>
                <a href="https://gemini.google.com/gem/1bvkGwoP6utwHsjvqXZ9_jullNBgHtjXC?usp=sharing" target="_blank" class="launcher-btn btn-gemini-sci">
                    理科の先生の部屋
                    <span>探究のグリーン</span>
                </a>
                <a href="https://gemini.google.com/gem/1xEYBviOvy9DaHcFSqYCbom2dr2ZtuIW0?usp=sharing" target="_blank" class="launcher-btn btn-gemini-soc">
                    ４年社会の先生の部屋
                    <span>考察のパープル</span>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script>
        const praiseStyles = [
            { style: "関西風", pitch: 1.0, rate: 1.05, lines: ["ようやったやん！", "ええ感じやで〜", "その調子や、ええで", "なんやかんや凄いな", "ほんま、よう頑張った"] },
            { style: "お嬢様風", pitch: 1.2, rate: 0.95, lines: ["見事ですわ", "よくできましたわね", "お見事でございます", "感心いたしましたわ", "さすがでございますね"] },
            { style: "博多風", pitch: 1.1, rate: 1.05, lines: ["よかよか、よかった", "がんばったとね〜", "うちもうれしいばい", "やったやん、すごいよ", "ええ感じやけん"] },
            { style: "ネコ風", pitch: 1.3, rate: 1.0, lines: ["すごいニャ！", "やったニャー！", "かっこいいニャ〜", "その調子ニャ！", "えらいニャ、よしよし"] },
            { style: "執事風", pitch: 0.85, rate: 0.95, lines: ["大変お見事です", "お疲れ様でございました", "素晴らしいかと存じます", "ご立派でございます", "かしこまりました、お見事"] },
            { style: "おかん風", pitch: 1.05, rate: 1.0, lines: ["よう頑張ったね〜", "えらいえらい！", "ご飯にしようか", "偉いね、ほんとに", "よしよし、いい子や"] },
            { style: "すみっコ風", pitch: 1.05, rate: 0.95, lines: ["やったあ〜つぎもいけるかも", "すみっこで喜んじゃう", "ちょっと誇らしいかも", "みんなのおかげだね", "ほっこりするね〜"] }
        ];

        function getDailyPraiseStyle() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
            return praiseStyles[dayOfYear % praiseStyles.length];
        }

        let lastAlarmSource = 'time'; // 'time' = 指定時刻アラーム, 'countdown' = カウントダウン終了

        const characterList = [
            { name: "ツンデレな幼馴染風", speech: "べ、別にアンタの心配なんてしてないんだからね！でも…タスクが残ってるなら、さっさと終わらせなさいよ！今日のメニューはこれよ！：", pitch: 1.2, rate: 1.1 },
            { name: "超スパルタ塾講師風", speech: "受験は甘くありません！さあ、今日も1点をもぎ取るために全力で集中しますよ！本日のタスクを読み上げます。起立、注目！：", pitch: 0.9, rate: 1.2 },
            { name: "戦国武将風", speech: "いざ出陣じゃーッ！今日の試練を乗り越え、天下統一の道を突き進むのじゃ！本日の軍令を伝える！：", pitch: 0.7, rate: 0.9 },
            { name: "博多弁の可愛い先輩風", speech: "今日もいっしょに勉強がんばろ？がんばるキミのこと、ずっと応援しとるけんね。今日のやること、教えるね！：", pitch: 1.1, rate: 1.0 },
            { name: "偉そうなイエネコ風", speech: "ふにゃ〜あ。人間よ、我の気が変わらぬうちにこれを片付けるが良い。今日の仕事ニャ：", pitch: 1.3, rate: 0.9 },
            { name: "上品なお嬢様風", speech: "ごきげんよう。本日も素晴らしい学問の時間を共に過ごしましょう。それでは、本日の課題でございます：", pitch: 1.1, rate: 1.0 }
        ];

        let audioCtx = null;
        let speechUnlocked = false;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            unlockSpeechSynthesis();
        }

        function unlockSpeechSynthesis() {
            if (window.speechSynthesis && !speechUnlocked) {
                speechUnlocked = true;
                const unlockUtterance = new SpeechSynthesisUtterance('いってみよう！');
                window.speechSynthesis.speak(unlockUtterance);
            }
        }
        
        function playSound(type) {
            initAudio(); 
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'success') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); 
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); 
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'alarm') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        let alarmInterval = null;
        let countdownInterval = null;
        let isTimerRunning = false;
        let timeLeft = 25 * 60; 
        let totalConfiguredTime = 25 * 60;

        // 初期表示の設定
        document.getElementById('timerDuration').addEventListener('change', function() {
            if(!isTimerRunning) {
                resetTimerDisplayFromInput();
            }
        });

        function resetTimerDisplayFromInput() {
            const m = parseInt(document.getElementById('timerDuration').value) || 25;
            timeLeft = m * 60;
            totalConfiguredTime = m * 60;
            updateTimerDisplay();
        }

        function updateLiveClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('liveClock').innerText = `${h}:${m}`;
        }
        updateLiveClock();

        setInterval(() => {
            const now = new Date();
            const currentHours = String(now.getHours()).padStart(2, '0');
            const currentMinutes = String(now.getMinutes()).padStart(2, '0');
            const currentTimeStr = `${currentHours}:${currentMinutes}`;

            document.getElementById('liveClock').innerText = `${currentHours}:${currentMinutes}`;

            const targetTimeStr = document.getElementById('alarmTime').value;
            
            if (currentTimeStr === targetTimeStr && !alarmInterval && now.getSeconds() === 0) {
                lastAlarmSource = 'time';
                triggerAlarm();
            }
        }, 1000);

        function toggleTimer() {
            initAudio(); 
            const btn = document.getElementById('startTimerBtn');
            if (isTimerRunning) {
                clearInterval(countdownInterval);
                btn.innerText = "カウントダウン再開";
                isTimerRunning = false;
            } else {
                if (timeLeft === totalConfiguredTime) {
                    // 開始時にフォームから最新の分数を取り込む
                    const m = parseInt(document.getElementById('timerDuration').value) || 25;
                    timeLeft = m * 60;
                    totalConfiguredTime = m * 60;
                }
                isTimerRunning = true;
                btn.innerText = "一時停止";
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        lastAlarmSource = 'countdown';
                        startPraiseAlarm();
                        resetTimerDisplayFromInput();
                        btn.innerText = "カウントダウン開始";
                        isTimerRunning = false;
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(countdownInterval);
            isTimerRunning = false;
            document.getElementById('startTimerBtn').innerText = "カウントダウン開始";
            resetTimerDisplayFromInput();
        }

        function updateTimerDisplay() {
            const minutes = Math.max(0, Math.floor(timeLeft / 60));
            const seconds = Math.max(0, timeLeft % 60);
            document.getElementById('timerText').innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            const percent = totalConfiguredTime > 0 ? (timeLeft / totalConfiguredTime) * 360 : 0;
            document.getElementById('timerCircle').style.background = `conic-gradient(var(--accent-blue) ${percent}deg, #edeef2 0deg)`;
        }

        let praiseLoopInterval = null;
        let praiseAutoStopTimeout = null;

        function startPraiseAlarm() {
            document.getElementById('gachaCard').classList.add('alarm-active');
            document.getElementById('stopAlarmBtn').style.display = 'inline-block';

            showPraiseMessage(); // すぐに1回目を再生

            if (!praiseLoopInterval) {
                praiseLoopInterval = setInterval(() => {
                    showPraiseMessage();
                }, 4000);
            }

            if (praiseAutoStopTimeout) clearTimeout(praiseAutoStopTimeout);
            praiseAutoStopTimeout = setTimeout(() => {
                stopAlarm();
            }, 60000); // 1分経ったら自動停止
        }

        function triggerAlarm() {
            document.getElementById('gachaCard').classList.add('alarm-active');
            document.getElementById('stopAlarmBtn').style.display = 'inline-block';
            if (!alarmInterval) {
                alarmInterval = setInterval(() => {
                    playSound('alarm');
                }, 400);
            }
        }

        function stopAlarm() {
            clearInterval(alarmInterval);
            alarmInterval = null;

            clearInterval(praiseLoopInterval);
            praiseLoopInterval = null;
            clearTimeout(praiseAutoStopTimeout);
            praiseAutoStopTimeout = null;
            if (window.speechSynthesis) window.speechSynthesis.cancel();

            document.getElementById('gachaCard').classList.remove('alarm-active');
            document.getElementById('stopAlarmBtn').style.display = 'none';

            if (lastAlarmSource !== 'countdown') {
                runGacha();
            }
        }

        function showPraiseMessage() {
            const dailyStyle = getDailyPraiseStyle();
            const line = dailyStyle.lines[Math.floor(Math.random() * dailyStyle.lines.length)];

            document.getElementById('charName').innerText = `🎉 タイマー終了！（${dailyStyle.style}）`;
            document.getElementById('charSpeech').innerText = line;

            if (window.speechSynthesis) {
                if (!window.speechSynthesis.speaking) {
                    const utterance = new SpeechSynthesisUtterance(line);
                    utterance.lang = 'ja-JP';
                    utterance.pitch = dailyStyle.pitch;
                    utterance.rate = dailyStyle.rate;

                    const jaVoice = getBestJapaneseVoice();
                    if (jaVoice) {
                        utterance.voice = jaVoice;
                    }

                    window.speechSynthesis.speak(utterance);
                }
            }
        }

        function runGacha() {
            const randomChar = characterList[Math.floor(Math.random() * characterList.length)];
            document.getElementById('charName').innerText = `今日の担当：${randomChar.name}`;

            const activeTasks = tasks.filter(t => !t.done).map(t => t.text);

            let speechText = randomChar.speech;
            if (activeTasks.length > 0) {
                speechText += activeTasks.join('、と、') + ' です！頑張ってくださいね！';
            } else {
                speechText += 'あれれ？今日のタスクは全部終わっているか、まだ登録されていないみたいですよ！素晴らしいですね！';
            }

            document.getElementById('charSpeech').innerText = speechText;

            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(speechText);
                utterance.lang = 'ja-JP';
                utterance.pitch = randomChar.pitch;
                utterance.rate = randomChar.rate;

                const jaVoice = getBestJapaneseVoice();
                if (jaVoice) {
                    utterance.voice = jaVoice;
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        function getBestJapaneseVoice() {
            if (!window.speechSynthesis) return null;
            const voices = window.speechSynthesis.getVoices();
            const jaVoices = voices.filter(v => v.lang === 'ja-JP' || v.lang === 'ja_JP' || v.lang.startsWith('ja'));
            if (jaVoices.length === 0) return null;
            // 「拡張版／Enhanced／Premium」など高品質ボイスを優先
            const enhanced = jaVoices.find(v => /enhanced|premium|高品質/i.test(v.name));
            return enhanced || jaVoices[0];
        }

        // ==========================================
        // タスク管理ロジック
        // ==========================================
        let tasks = []; // 各要素は { text: "算数プリント", done: false }
        const TASKS_STORAGE_KEY = 'fumiben_tasks_v1';

        function saveTasks() {
            try {
                localStorage.setItem(TASKS_STORAGE_KEY, JSON.stringify(tasks));
            } catch (e) {
                console.error('タスクの保存に失敗しました', e);
            }
        }

        function loadTasks() {
            try {
                const saved = localStorage.getItem(TASKS_STORAGE_KEY);
                if (saved) {
                    tasks = JSON.parse(saved);
                }
            } catch (e) {
                console.error('タスクの読み込みに失敗しました', e);
                tasks = [];
            }
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            if (tasks.length === 0) {
                list.innerHTML = '<li class="task-item" style="font-size:16px; color:#888; justify-content:center; cursor:default; border:none; background:none; text-align:center;">本日の「ふみ勉」タスクはありません。<br>下のボタンから登録してね。</li>';
                return;
            }

            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = 'task-item' + (task.done ? ' completed' : '');
                li.innerHTML = `<div class="task-checkbox"></div><span class="task-text" style="flex:1;">${task.text}</span><span class="task-edit" data-index="${index}">✏️</span><span class="task-delete" data-index="${index}">✕</span><span class="task-handle">⠿</span>`;

                li.querySelector('.task-checkbox').onclick = (e) => {
                    e.stopPropagation();
                    toggleTaskDone(index);
                };
                li.querySelector('.task-text').onclick = () => toggleTaskDone(index);
                li.querySelector('.task-edit').onclick = (e) => {
                    e.stopPropagation();
                    startEditTask(index, li);
                };
                li.querySelector('.task-delete').onclick = (e) => {
                    e.stopPropagation();
                    deleteTask(index);
                };

                list.appendChild(li);
            });
        }

        function startEditTask(index, li) {
            const textSpan = li.querySelector('.task-text');
            const currentText = tasks[index].text;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentText;
            input.className = 'task-edit-input';
            input.style.flex = '1';
            input.style.fontSize = '18px';
            input.style.padding = '4px 8px';
            input.style.borderRadius = '8px';
            input.style.border = '2px solid var(--accent-blue)';
            input.style.fontFamily = "'Zen Maru Gothic', sans-serif";

            textSpan.replaceWith(input);
            input.focus();
            input.select();

            const finishEdit = () => {
                const newText = input.value.trim();
                if (newText) {
                    tasks[index].text = newText;
                    saveTasks();
                }
                renderTasks();
            };

            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    input.blur();
                }
            });
            input.addEventListener('click', (e) => e.stopPropagation());
        }

        function toggleTaskDone(index) {
            tasks[index].done = !tasks[index].done;
            if (tasks[index].done) playSound('success');
            saveTasks();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks();
            renderTasks();
        }

        function loadTasksFromURL() {
            const params = new URLSearchParams(window.location.search);
            const tasksParam = params.get('tasks');
            if (tasksParam) {
                const newTaskTexts = decodeURIComponent(tasksParam).split(/[,、]/).map(t => t.trim()).filter(t => t.length > 0);
                newTaskTexts.forEach(text => {
                    tasks.push({ text: text, done: false });
                });
                saveTasks();
            }
            renderTasks();
        }

        function toggleImportArea() {
            const area = document.getElementById('importArea');
            area.style.display = area.style.display === 'block' ? 'none' : 'block';
        }

        function importTasksFromInput() {
            const inputVal = document.getElementById('csvTasks').value;
            if(inputVal) {
                const newTasks = inputVal.split(/[,、]/).map(t => t.trim()).filter(t => t.length > 0);
                newTasks.forEach(text => {
                    tasks.push({ text: text, done: false });
                });
                document.getElementById('csvTasks').value = '';
                saveTasks();
                renderTasks();
                toggleImportArea();
            }
        }

        // Service Worker登録(オフライン対応・ホーム画面追加対応)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch((err) => {
                    console.error('Service Worker登録失敗:', err);
                });
            });
        }

        window.onload = () => {
            loadTasks();
            loadTasksFromURL();
            resetTimerDisplayFromInput();
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = () => {
                    window.speechSynthesis.getVoices();
                };
            }

            if (window.Sortable) {
                new Sortable(document.getElementById('taskList'), {
                    handle: '.task-handle',
                    animation: 150,
                    onEnd: function (evt) {
                        const movedItem = tasks.splice(evt.oldIndex, 1)[0];
                        tasks.splice(evt.newIndex, 0, movedItem);
                        saveTasks();
                        renderTasks();
                    }
                });
            }
        };
    </script>
</body>
</html>
