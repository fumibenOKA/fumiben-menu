<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>データバックアップ</title>
<style>
  body { font-family: sans-serif; padding: 16px; background:#f2efe9; color:#333; }
  h2 { font-size: 16px; }
  textarea { width: 100%; height: 160px; font-size: 13px; margin-bottom: 16px; }
  button { padding: 10px 16px; font-size: 14px; margin-bottom: 24px; }
</style>
</head>
<body>
  <h2>① タスク (fumiben_tasks_v1)</h2>
  <textarea readonly id="t1"></textarea>

  <h2>② ちょっとコイン (fumiben_coinwallet_v1)</h2>
  <textarea readonly id="t2"></textarea>

  <h2>③ ちょきんばこ (fumiben_piggy_v1)</h2>
  <textarea readonly id="t3"></textarea>

  <p>↑ 各欄をタップして全選択 → コピー → メモアプリなどに貼り付けて保存してください。</p>

  <script>
    document.getElementById('t1').value = localStorage.getItem('fumiben_tasks_v1') || '(データなし)';
    document.getElementById('t2').value = localStorage.getItem('fumiben_coinwallet_v1') || '(データなし)';
    document.getElementById('t3').value = localStorage.getItem('fumiben_piggy_v1') || '(データなし)';

    // タップで全選択
    document.querySelectorAll('textarea').forEach(t => {
      t.addEventListener('click', () => t.select());
    });
  </script>
</body>
</html>
